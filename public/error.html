<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WorkSafeBC - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://ux-static.online.worksafebc.com/css/wsbc.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    body { background-color: #F1F0EF; padding: 40px 0; }
    .main-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 60px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { max-width: 250px; margin-bottom: 40px; }
    h1 { color: #003366; margin-bottom: 12px; font-size: 28px; }
    .subtitle { color: #6B6B6B; font-size: 16px; margin-bottom: 25px; line-height: 1.6; }
    .actions .btn { display: block; width: 100%; margin-bottom: 12px; font-size: 18px; padding: 15px; }
    .note { margin-top: 20px; padding-top: 18px; border-top: 1px solid #E0E0E0; color: #888; font-size: 14px; }
  </style>
</head>

<body>
  <div class="main-container">
    <img
      src="https://ux-static.online.worksafebc.com/css/assets/img/worksafebc-logo.jpg"
      alt="WorkSafeBC"
      class="logo"
    >

    <h1 id="title">Page not found</h1>
    <p class="subtitle" id="message">
      The page you’re looking for doesn’t exist, or the link is no longer available.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-blue btn-lg">
        <i class="fa fa-home"></i> Go to Home
      </a>
      <button class="btn btn-outline-blue btn-lg" onclick="history.back()">
        <i class="fa fa-arrow-left"></i> Go Back
      </button>
    </div>

    <div class="note">
      <i class="fa fa-info-circle"></i>
      If you believe this is an error, try refreshing the page or returning to Home.
    </div>
  </div>

  <script>
    // Optional: allow /error.html?code=500&msg=Something
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const msg = params.get('msg');

    if (code === '500') {
      document.title = 'WorkSafeBC - Server Error';
      document.getElementById('title').textContent = 'Something went wrong';
      document.getElementById('message').textContent =
        msg || 'An unexpected server error occurred. Please try again.';
    } else if (code === '403') {
      document.title = 'WorkSafeBC - Access Denied';
      document.getElementById('title').textContent = 'Access denied';
      document.getElementById('message').textContent =
        msg || 'You do not have permission to view this page.';
    } else if (code === '404') {
      document.title = 'WorkSafeBC - Page Not Found';
    }
  </script>
</body>
</html>
