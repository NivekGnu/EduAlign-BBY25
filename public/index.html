<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkSafeBC – Redirecting...</title>
  <!-- Minimal styling or none needed -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
</head>
<body>

  <script>
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.replace('/landing.html'); // DO NOT CHANGE
        return;
      }

      try {
        const tokenResult = await user.getIdTokenResult(true); // force refresh to catch latest claims
        const role = tokenResult.claims.role || 'applicant';

        if (role === 'reviewer') {
          window.location.replace('/reviewer-index.html');
        } else {
          window.location.replace('/applicant-index.html');
        }
      } catch (err) {
        console.error("Auth/role check failed", err);
        window.location.replace('/');
      }
    });
  </script>
</body>
</html>
