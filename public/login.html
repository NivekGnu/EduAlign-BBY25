<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - WorkSafeBC</title>
  <link rel="stylesheet" href="https://ux-static.online.worksafebc.com/css/wsbc.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  
  <style>
    body { background-color: #F1F0EF; padding: 40px 0; }
    .main-container { max-width: 500px; margin: 0 auto; background: white; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .logo { max-width: 200px; margin: 0 auto 30px; display: block; }
    .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; display: none; }
    .alert-error { background-color: #F9E0A0; border-left: 4px solid #F1BE48; }
    .alert-success { background-color: #E7E8D6; border-left: 4px solid #888D30; }
  </style>
</head>
<body>
  <div class="main-container">
    <img src="https://ux-static.online.worksafebc.com/css/assets/img/worksafebc-logo.jpg" alt="WorkSafeBC" class="logo">
    <h1>Login</h1>
    <div id="alertBox" class="alert"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-blue btn-block btn-lg" id="loginButton">
        <i class="fa fa-sign-in"></i> Login
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
      <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
      <p><a href="/">Go Back</a></p>
    </div>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <script>
    $('#loginForm').on('submit', async function(e) {
      e.preventDefault();
      
      const email = $('#email').val();
      const password = $('#password').val();
      
      $('#loginButton').prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> Logging in...');
      
      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        const user = firebase.auth().currentUser;
        const tokenResult = await user.getIdTokenResult();
        const role = tokenResult.claims.role || 'applicant';
        
        if (role === 'reviewer') {
          window.location.href = '/reviewer-index.html';
        } else {
          window.location.href = '/applicant-index.html';
        }
      } catch (error) {
        $('#alertBox').addClass('alert-error').text(error.message).show();
        $('#loginButton').prop('disabled', false).html('<i class="fa fa-sign-in"></i> Login');
      }
    });
  </script>
</body>
</html>
