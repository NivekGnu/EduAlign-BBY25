<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - WorkSafeBC</title>
  <link rel="stylesheet" href="https://ux-static.online.worksafebc.com/css/wsbc.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  
  <style>
    body { background-color: #F1F0EF; padding: 40px 0; }
    .main-container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .logo { max-width: 200px; margin: 0 auto 30px; display: block; }
    .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; display: none; }
    .alert-error { background-color: #F9E0A0; border-left: 4px solid #F1BE48; }
  </style>
</head>
<body>
  <div class="main-container">
    <img src="https://ux-static.online.worksafebc.com/css/assets/img/worksafebc-logo.jpg" alt="WorkSafeBC" class="logo">
    <h1>Create Account</h1>
    <div id="alertBox" class="alert"></div>
    
    <form id="signupForm">
      <div class="form-group">
        <label for="name">Your Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email <span class="text-danger">*</span></label>
        <input type="email" class="form-control" id="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password <span class="text-danger">*</span></label>
        <input type="password" class="form-control" id="password" required minlength="6">
        <small class="text-muted">Minimum 6 characters</small>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password <span class="text-danger">*</span></label>
        <input type="password" class="form-control" id="confirmPassword" required>
      </div>
      
      <button type="submit" class="btn btn-blue btn-block btn-lg" id="signupButton">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
      <p>Already have an account? <a href="/login.html">Login</a></p>
      <p><a href="/">Go Back</a></p>
    </div>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <script>
    $(document).ready(function() {
      $('#signupForm').on('submit', async function(e) {
        e.preventDefault();
        
        const name = $('#name').val();
        const email = $('#email').val();
        const password = $('#password').val();
        const confirmPassword = $('#confirmPassword').val();
        
        if (password !== confirmPassword) {
          $('#alertBox').addClass('alert-error').text('Passwords do not match').show();
          return;
        }
        
        $('#signupButton').prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> Creating...');
        
        try {
          // Create Firebase user
          const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
          const uid = userCredential.user.uid;
          
          // Update display name
          await userCredential.user.updateProfile({ displayName: name });
          
          // Call backend to set role
          const roleResponse = await fetch('/api/auth/set-role', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid })
          });
          
          const roleResult = await roleResponse.json();
          
          if (!roleResult.success) {
            throw new Error('Failed to set user role');
          }
          
          // Force token refresh to get new claims
          await firebase.auth().currentUser.getIdToken(true);
          
          const tokenResult = await firebase.auth().currentUser.getIdTokenResult();
          const role = tokenResult.claims.role || 'applicant';
          
          // Redirect based on role
          if (role === 'reviewer') {
            window.location.href = '/reviewer-index.html';
          } else {
            window.location.href = '/applicant-index.html';
          }
          
        } catch (error) {
          $('#alertBox').addClass('alert-error').text(error.message).show();
          $('#signupButton').prop('disabled', false).html('<i class="fa fa-user-plus"></i> Create Account');
        }
      });
    });
  </script>
</body>
</html>
